name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-lint:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Lint Frontend (ESLint, Stylelint, HTMLHint)
        run: npm run lint

  unit-tests:
    name: JavaScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Unit Tests
        run: npm test

  e2e-tests:
    name: End-to-End Browser Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --silent
      - name: Run Playwright E2E Tests
        run: |
          npm run test:e2e 2>&1 | grep -E "(chromium|›|✓|✗|passed|failed|flaky|skipped|skip)" || true
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-lint, unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare clean Pages artifact
        run: npm run build:pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
